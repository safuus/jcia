name: Deploy Smoke Test

on:
  deployment_status:

jobs:
  smoke-test:
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'Production'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploy to propagate
        run: sleep 30

      - name: Basic health check
        run: |
          STATUS=$(curl -sf https://www.justcodeit.academy/api/health | jq -r .status)
          echo "Health: $STATUS"
          [ "$STATUS" = "ok" ] || exit 1

      - name: Full smoke test (sends deploy email)
        env:
          DEPLOY_TEST_SECRET: ${{ secrets.DEPLOY_TEST_SECRET }}
        run: |
          RESULT=$(curl -sf "https://www.justcodeit.academy/api/health?secret=$DEPLOY_TEST_SECRET")
          echo "$RESULT" | jq .
          STATUS=$(echo "$RESULT" | jq -r .status)
          [ "$STATUS" = "ok" ] || exit 1
          echo "Deploy email sent successfully"

      - name: Send failure notification
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          curl -s -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H 'Content-Type: application/json' \
            -d "{
              \"from\": \"JCIA Deploy <hello@updates.justcodeit.academy>\",
              \"to\": \"max@justcodeit.academy\",
              \"subject\": \"[JCIA ALERT] Deploy smoke test FAILED\",
              \"text\": \"Deploy smoke test failed for justcodeit.academy.\\n\\nCommit: ${{ github.event.deployment_status.deployment.sha }}\\nTime: $(date -u +%Y-%m-%dT%H:%M:%SZ)\\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\\n\\nCheck the GitHub Actions log for details.\"
            }"
          echo "Failure notification sent"
